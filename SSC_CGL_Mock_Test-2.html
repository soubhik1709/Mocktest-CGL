        let currentIndex = 0;
        const answers = new Array(questions.length).fill(null);
        const visited = new Array(questions.length).fill(false);


        // Timer Logic (60 Minutes)
        let timeRemaining = 3600; 
        const timerElement = document.getElementById("timer");
        
        const timerInterval = setInterval(() => {
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                submitTest();
            } else {
                let minutes = Math.floor(timeRemaining / 60);
                let seconds = timeRemaining % 60;
                timerElement.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                timeRemaining--;
            }
        }, 1000);


        function init() {
            buildPalette();
            loadQuestion(0);
        }


        function buildPalette() {
            const palette = document.getElementById("question-palette");
            palette.innerHTML = '';
            questions.forEach((q, index) => {
                const btn = document.createElement("div");
                btn.className = "grid-btn";
                btn.innerText = index + 1;
                btn.onclick = () => loadQuestion(index);
                btn.id = `pal-btn-${index}`;
                palette.appendChild(btn);
            });
        }


        function updatePaletteUI() {
            questions.forEach((_, index) => {
                const btn = document.getElementById(`pal-btn-${index}`);
                btn.classList.remove('active', 'answered', 'not-answered');
                
                if (index === currentIndex) {
                    btn.classList.add('active');
                }
                
                if (answers[index] !== null) {
                    btn.classList.add('answered');
                } else if (visited[index]) {
                    btn.classList.add('not-answered');
                }
            });
        }


        function loadQuestion(index) {
            currentIndex = index;
            visited[index] = true;
            
            const q = questions[index];
            document.getElementById("question-text").innerHTML = q.text;
            
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const label = document.createElement("label");
                label.className = "option-label";
                
                const input = document.createElement("input");
                input.type = "radio";
                input.name = "option";
                input.value = i;
                if (answers[index] === i) input.checked = true;
                
                input.onchange = () => { answers[index] = i; };
                
                label.appendChild(input);
                label.appendChild(document.createTextNode(opt));
                optionsContainer.appendChild(label);
            });
            
            updatePaletteUI();
        }


        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                loadQuestion(currentIndex + 1);
            }
        }


        function prevQuestion() {
            if (currentIndex > 0) {
                loadQuestion(currentIndex - 1);
            }
        }


        function clearResponse() {
            answers[currentIndex] = null;
            loadQuestion(currentIndex); // Reload to clear radio button
        }


        function submitTest() {
            clearInterval(timerInterval);
            document.getElementById("header").classList.add("hidden");
            document.getElementById("test-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");
            
            // Calculate attempted questions
            const attempted = answers.filter(a => a !== null).length;
            document.getElementById("score").innerText = attempted; 
            document.getElementById("total-q").innerText = questions.length;
        }


        window.onload = init;
    </script>
